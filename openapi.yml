openapi: "3.0.3"
info:
  title: Sidekiq Training API
  description: Personal activity tracker — receives event records and processes them asynchronously via Sidekiq.
  version: "1.0.0"

servers:
  - url: http://localhost:5000/api
    description: Local development

tags:
  - name: events
    description: Activity event records
  - name: categories
    description: Event categories

paths:
  /events:
    get:
      tags: [events]
      summary: List all events
      responses:
        "200":
          description: Array of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

    post:
      tags: [events]
      summary: Create an event
      description: Creates the event with status `pending` and enqueues async processing. Poll GET /events/:id to check when status becomes `processed`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event]
              properties:
                event:
                  $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Event created (processing enqueued)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "422":
          description: Validation errors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrors"

  /events/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer

    get:
      tags: [events]
      summary: Get a single event
      responses:
        "200":
          description: Event found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Event not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"

    patch:
      tags: [events]
      summary: Update an event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event]
              properties:
                event:
                  $ref: "#/components/schemas/EventInput"
      responses:
        "200":
          description: Event updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "422":
          description: Validation errors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrors"

    put:
      tags: [events]
      summary: Replace an event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event]
              properties:
                event:
                  $ref: "#/components/schemas/EventInput"
      responses:
        "200":
          description: Event updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "422":
          description: Validation errors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrors"

    delete:
      tags: [events]
      summary: Delete an event
      responses:
        "200":
          description: Deleted event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Event not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"

  /categories:
    get:
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: Array of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

    post:
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category]
              properties:
                category:
                  $ref: "#/components/schemas/CategoryInput"
      responses:
        "200":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "422":
          description: Validation errors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrors"

  /categories/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer

    get:
      tags: [categories]
      summary: Get a single category
      responses:
        "200":
          description: Category found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Category not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"

    patch:
      tags: [categories]
      summary: Update a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category]
              properties:
                category:
                  $ref: "#/components/schemas/CategoryInput"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "422":
          description: Validation errors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrors"

    put:
      tags: [categories]
      summary: Replace a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category]
              properties:
                category:
                  $ref: "#/components/schemas/CategoryInput"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "422":
          description: Validation errors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrors"

    delete:
      tags: [categories]
      summary: Delete a category
      description: Fails with 422 if the category has associated events.
      responses:
        "200":
          description: Deleted category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Category not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
        "422":
          description: Cannot delete — category has associated events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrors"

components:
  schemas:
    Event:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: "corri 5km"
        category_id:
          type: integer
        observation:
          type: string
          nullable: true
          example: "feeling good"
        timestamp:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [pending, processing, processed, failed]
          description: Updated asynchronously by EventProcessorJob
        processed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    EventInput:
      type: object
      required: [name, category_id]
      properties:
        name:
          type: string
          example: "corri 5km"
        category_id:
          type: integer
        observation:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time
          nullable: true

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: "Exercício"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: "Exercício"

    NotFoundError:
      type: object
      properties:
        error:
          type: string
          example: "Couldn't find Event with 'id'=999"

    ValidationErrors:
      type: object
      additionalProperties:
        type: array
        items:
          type: string
      example:
        name: ["can't be blank"]
        category: ["must exist"]
